query GetDealers(
  $entityType: String
  $entityCode: String
  $department: String
  $respCenters: [String!]
  $take: Int
  $after: String
  $where: SalespersonPurchaserFilterInput
  $order: [SalespersonPurchaserSortInput!]
) {
  dealers: myDealers(
    entityType: $entityType
    entityCode: $entityCode
    department: $department
    respCenters: $respCenters
    first: $take
    after: $after
    where: $where
    order: $order
  ) {
    items: nodes {
      code
      name
      phoneNo: mobileNo
      depot
      eMail
      dealershipName
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}
