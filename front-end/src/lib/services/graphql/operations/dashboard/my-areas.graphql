query GetMyAreas(
  $entityType: String
  $entityCode: String
  $department: String
  $respCenters: [String!]
  $first: Int
  $after: String
  $where: AreaFilterInput
) {
  myAreas(
    entityType: $entityType
    entityCode: $entityCode
    department: $department
    respCenters: $respCenters
    first: $first
    after: $after
    where: $where
  ) {
    nodes {
      code
      name
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}
