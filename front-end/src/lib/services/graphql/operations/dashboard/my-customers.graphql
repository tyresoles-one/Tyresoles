query GetMyCustomers(
  $entityType: String
  $entityCode: String
  $department: String
  $respCenter: String
  $first: Int
  $after: String
  $where: CustomerFilterInput
) {
  myCustomers(
    entityType: $entityType
    entityCode: $entityCode
    department: $department
    respCenter: $respCenter
    first: $first
    after: $after
    where: $where
  ) {
    nodes {
      no
      name
      city
      balance
      address
      address2
      postCode
      stateCode
      areaCode
      dealerCode
      gstRegistrationNo
      gstStatus
      panNo
      customerPriceGroup
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}
