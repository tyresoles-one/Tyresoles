# ── Mutations ────────────────────────────────

mutation NavEditSaveRequestType($input: NavEditRequestTypeInput!) {
  navEditSaveRequestType(input: $input) {
    success
    message
  }
}

mutation NavEditDeleteRequestType($id: Int!) {
  navEditDeleteRequestType(id: $id) {
    success
    message
  }
}

mutation NavEditSubmitRequest($input: NavEditRequestInput!) {
  navEditSubmitRequest(input: $input) {
    success
    message
  }
}

mutation NavEditResendNotifications($requestId: UUID!) {
  navEditResendNotifications(requestId: $requestId) {
    success
    message
  }
}

mutation NavEditApproveRequest($requestId: UUID!, $level: Int!, $comment: String) {
  navEditApproveRequest(requestId: $requestId, level: $level, comment: $comment) {
    success
    message
  }
}

mutation NavEditRejectRequest($requestId: UUID!, $comment: String, $isApproval: Boolean, $level: Int) {
  navEditRejectRequest(requestId: $requestId, comment: $comment, isApproval: $isApproval, level: $level) {
    success
    message
  }
}

mutation NavEditProcessRequest($requestId: UUID!, $adminRemark: String) {
  navEditProcessRequest(requestId: $requestId, adminRemark: $adminRemark) {
    success
    message
  }
}
