# ── Queries ──────────────────────────────────

query NavEditRequestTypes($activeOnly: Boolean) {
  navEditRequestTypes(activeOnly: $activeOnly) {
    id
    name
    code
    description
    icon
    navTable
    navPrimaryKeyColumn
    fieldsJson
    isActive
    sortOrder
  }
}

query NavEditRequestTypeById($id: Int!) {
  navEditRequestTypeById(id: $id) {
    id
    name
    code
    description
    icon
    navTable
    navPrimaryKeyColumn
    fieldsJson
    isActive
    sortOrder
  }
}

query NavEditLookupRecords($requestTypeId: Int!, $search: String, $take: Int) {
  navEditLookupRecords(requestTypeId: $requestTypeId, search: $search, take: $take) {
    key
    value
  }
}

query NavEditGetRecord($requestTypeId: Int!, $recordKey: String!) {
  navEditGetRecord(requestTypeId: $requestTypeId, recordKey: $recordKey) {
    key
    value
  }
}

query NavEditMyRequests {
  navEditMyRequests {
    id
    requestTypeId
    requestTypeName
    requestTypeCode
    requestTypeIcon
    recordKey
    requestBody
    userId
    userFullName
    status
    statusLabel
    remark
    adminRemark
    processedBy
    processedAt
    createdAt
    updatedAt
    approvals {
      id
      level
      role
      roleLabel
      approverUserIds
      approvedBy
      status
      statusLabel
      comment
      actionDate
    }
  }
}

